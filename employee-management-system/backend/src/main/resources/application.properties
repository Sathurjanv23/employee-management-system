spring.application.name=backend

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/employee_management

# Server
server.port=8080

# JWT
jwt.secret=YourSuperSecretKeyForEmployeeManagementSystem

# Frontend URL used in reset email link
app.frontend.base-url=http://localhost:3000

# Mail configuration (set real values before production use)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true